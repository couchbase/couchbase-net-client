name: Build FIT Performer

on:
  push:
    branches:
      - master
      - '*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build FIT Performer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest]
    env:
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      DOTNET_NOLOGO: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
          cache: false

      - name: Restore
        run: dotnet restore couchbase-fit-performer.sln

      - name: Build (Release)
        run: dotnet build couchbase-fit-performer.sln --configuration Release --no-restore
