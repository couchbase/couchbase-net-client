name: API Docs

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version to publish docs as (e.g. 3.9.4, 3.9.4-rc1)'
        required: true
      build_ref:
        description: 'Optional git ref (branch/tag/SHA) to build FROM. Defaults to version_tag (e.g. build_ref=master, version_tag=3.9.4).'
        required: false
        default: ''
      publish:
        description: 'Publish to S3 (leave false for a smoke run)'
        type: boolean
        required: false
        default: false
  workflow_call:
    inputs:
      version_tag:
        type: string
        required: true
      build_ref:
        type: string
        required: false
        default: ''
      publish:
        type: boolean
        required: false
        default: false

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: 1
  DOCFX_VERSION: 2.78.5

jobs:
  validate-inputs:
    name: Validate Inputs
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      ref: ${{ steps.compute.outputs.ref }}
      publish: ${{ steps.compute.outputs.publish }}
    steps:
      - id: compute
        name: Compute version, ref, publish flag
        shell: bash
        env:
          # `inputs` is populated for both workflow_dispatch and workflow_call.
          INPUT_TAG: ${{ inputs.version_tag }}
          INPUT_BUILD_REF: ${{ inputs.build_ref }}
          INPUT_PUBLISH: ${{ inputs.publish }}
        run: |
          TAG_INPUT="$INPUT_TAG"
          BUILD_REF_INPUT="$INPUT_BUILD_REF"
          PUBLISH_INPUT="$INPUT_PUBLISH"
          if [ -z "$TAG_INPUT" ]; then
            echo "Version is required." >&2
            exit 1
          fi
          if ! echo "$TAG_INPUT" | grep -Eq '^(v)?[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "Version must be a semantic version (e.g. 3.9.4 or v3.9.4-rc1)." >&2
            exit 1
          fi
          VER="${TAG_INPUT#v}"
          REF="${BUILD_REF_INPUT:-$TAG_INPUT}"
          {
            echo "version=$VER"
            echo "ref=$REF"
            echo "publish=$PUBLISH_INPUT"
          } >> "$GITHUB_OUTPUT"

  build-docs:
    name: Build API Docs
    runs-on: ubuntu-latest
    needs: validate-inputs
    env:
      VERSION: ${{ needs.validate-inputs.outputs.version }}
      API_NAME: couchbase-net-client
      AWS_REGION: us-west-1
      S3_BUCKET: docs.couchbase.com
      DOCS_DIR: doc/CouchbaseNetClientDocs
    steps:
      - name: Checkout (smoke)
        if: needs.validate-inputs.outputs.publish != 'true'
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Checkout ref
        if: needs.validate-inputs.outputs.publish == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-inputs.outputs.ref }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
          cache: false

      - name: Install DocFX
        run: dotnet tool install -g docfx --version ${{ env.DOCFX_VERSION }}

      # Metadata is generated from the compiled assemblies because the SDK uses
      # newer C# syntax than DocFX's bundled Roslyn can parse from source.
      - name: Build SDK assemblies (net10.0)
        run: |
          dotnet build src/Couchbase/Couchbase.csproj -c Release -f net10.0 /p:Version=$VERSION
          dotnet build src/Couchbase.Extensions.DependencyInjection/Couchbase.Extensions.DependencyInjection.csproj -c Release -f net10.0 /p:Version=$VERSION

      - name: Stamp version into docs
        run: |
          sed -i "s/__CB_SDK_VERSION__/$VERSION/g" "$DOCS_DIR/index.md"

      - name: Generate API metadata and build site
        run: |
          cd "$DOCS_DIR"
          docfx metadata docfx.json
          docfx build docfx.json

      - name: Validate site generated
        run: |
          test -d "$DOCS_DIR/_site/api" || (echo "No API output found" && exit 1)
          count=$(ls -1 "$DOCS_DIR/_site/api/"*.html | wc -l)
          echo "Generated $count API HTML file(s)"
          test "$count" -ge 2 || (echo "Insufficient API HTML files" && exit 1)

      - name: Archive docs
        run: |
          (cd "$DOCS_DIR/_site" && zip -rq "$GITHUB_WORKSPACE/$API_NAME-$VERSION.zip" .)

      - name: Upload API Docs Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apidocs-zip
          path: ${{ env.API_NAME }}-${{ env.VERSION }}.zip

  publish-docs:
    name: Publish API Docs to S3
    runs-on: ubuntu-latest
    needs: [validate-inputs, build-docs]
    if: needs.validate-inputs.outputs.publish == 'true'
    permissions:
      id-token: write   # required to mint the GitHub OIDC token for AWS
      contents: read
    env:
      VERSION: ${{ needs.validate-inputs.outputs.version }}
      API_NAME: couchbase-net-client
      AWS_REGION: us-west-1
      S3_BUCKET: docs.couchbase.com
    steps:
      - name: Download API Docs Artifact
        uses: actions/download-artifact@v4
        with:
          name: apidocs-zip
          path: ./apidocs

      - name: Unzip docs
        run: |
          mkdir -p site
          unzip -q "./apidocs/$API_NAME-$VERSION.zip" -d site

      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::786014483886:role/SDK_GHA

      - name: Publish to S3
        run: |
          aws s3 sync ./site/ "s3://$S3_BUCKET/sdk-api/$API_NAME-$VERSION/" --acl public-read --delete

  smoke-docs-s3:
    name: Smoke test docs S3 access
    runs-on: ubuntu-latest
    needs: [validate-inputs]
    if: needs.validate-inputs.outputs.publish != 'true'
    permissions:
      id-token: write   # required to mint the GitHub OIDC token for AWS
      contents: read
    env:
      AWS_REGION: us-west-1
      S3_BUCKET: docs.couchbase.com
    steps:
      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::786014483886:role/SDK_GHA

      - name: Smoke test docs S3 write access
        shell: bash
        run: |
          # Reversible round-trip under the same sdk-api/ prefix the real publish
          # uses. The real publish is `aws s3 sync --delete`, so exercise every op
          # it needs -- PutObject, PutObjectAcl, ListBucket, DeleteObject -- so a
          # green smoke guarantees the real docs publish will work. bash runs with
          # -eo pipefail, so any denied op fails the step (no best-effort here).
          KEY="sdk-api/_smoke/smoke-${{ github.run_id }}.txt"
          echo "docs-smoke ${{ github.run_id }}" > smoke.txt
          aws s3 cp smoke.txt "s3://${S3_BUCKET}/${KEY}" --acl public-read   # PutObject + PutObjectAcl
          curl -fsSI "https://${S3_BUCKET}/${KEY}" > /dev/null               # public-read landed
          aws s3 ls "s3://${S3_BUCKET}/sdk-api/_smoke/" > /dev/null          # ListBucket (sync diffs the prefix)
          aws s3 rm "s3://${S3_BUCKET}/${KEY}"                               # DeleteObject (sync --delete)
          echo "✓ docs S3 access verified (put + public-read acl + list + delete)"
